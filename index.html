<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;background:#080c18;color:#dde4f0}
#app{display:grid;width:100vw;height:100vh;grid-template-rows:52px 1fr 1fr;gap:0}
/* HEADER */
header{background:#0d1226;border-bottom:1px solid #1e2a48;display:flex;align-items:center;padding:0 12px;gap:10px;flex-shrink:0}
.logo{font-size:14px;font-weight:800;color:#f8fafc;white-space:nowrap;letter-spacing:-.3px}
.logo em{color:#f59e0b;font-style:normal}
.kpis{display:flex;gap:5px;flex:1}
.kpi{background:#111827;border:1px solid #1e2d4a;border-radius:5px;padding:3px 9px;display:flex;flex-direction:column;align-items:center}
.kpi b{font-size:15px;font-weight:800;line-height:1.15}
.kpi s{font-size:8.5px;color:#7a8fb0;text-transform:uppercase;letter-spacing:.5px;font-style:normal;text-decoration:none;display:block}
.filters{display:flex;gap:5px;align-items:center;margin-left:auto}
input,select{background:#111827;border:1px solid #1e2d4a;color:#dde4f0;border-radius:4px;padding:3px 7px;font-size:11px;outline:none}
input:focus,select:focus{border-color:#3b4f80}
/* GRID */
.row{display:grid;gap:5px;padding:5px 6px}
.row1{grid-template-columns:220px 1fr 210px}
.row2{grid-template-columns:1fr 1fr 1fr;padding-top:0}
/* PANELS */
.panel{background:#0d1226;border:1px solid #1a2540;border-radius:7px;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.ph{background:#111827;padding:5px 9px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1a2540;flex-shrink:0}
.ph h3{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:#7a8fb0}
.pb{flex:1;overflow:hidden;min-height:0;padding:5px}
/* SCORE LIST */
.slist{overflow-y:auto;height:100%}
.srow{display:flex;align-items:center;gap:5px;padding:3px 7px;border-bottom:1px solid #111827;cursor:default}
.srow:hover{background:#111827}
.sdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sname{font-size:10px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sbar-w{width:55px;height:5px;background:#1a2540;border-radius:3px;overflow:hidden;flex-shrink:0}
.sbar{height:100%;border-radius:3px}
.sseats{font-size:13px;font-weight:800;width:28px;text-align:right;flex-shrink:0}
/* TABLE */
.tscroll{overflow-y:auto;height:100%}
table{width:100%;border-collapse:collapse;font-size:10px}
th{background:#111827;padding:4px 6px;text-align:left;font-size:9px;text-transform:uppercase;color:#5a6f90;position:sticky;top:0;cursor:pointer;white-space:nowrap;user-select:none}
th:hover{color:#a0b4d0}
td{padding:3px 6px;border-bottom:1px solid #111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:0}
td:nth-child(1){width:28px}
td:nth-child(2){max-width:130px;width:130px}
td:nth-child(3){max-width:120px;width:120px}
td:nth-child(4){width:68px}
td:nth-child(5),td:nth-child(6),td:nth-child(7),td:nth-child(8){width:65px;text-align:right}
tr:hover td{background:#111827}
.badge{display:inline-block;padding:1px 4px;border-radius:3px;font-size:8.5px;font-weight:700}
/* TABS */
.tabs{display:flex;gap:3px}
.tab{background:#1a2540;border:1px solid #253560;color:#7a8fb0;border-radius:3px;padding:1px 7px;font-size:9px;cursor:pointer}
.tab.on{background:#2d3f70;color:#dde4f0;border-color:#3d5090}
</style>
</head>

  </div>
</div>

  'Independent':'IND'
};
const pc=p=>PC[p]||'#64748b';
const sh=p=>SH[p]||p.slice(0,7);

/* ----- party aggregates ----- */
const pSeats={}, pVotes={};
RAW.forEach(d=>{pSeats[d.p]=(pSeats[d.p]||0)+1; pVotes[d.p]=(pVotes[d.p]||0)+d.wv;});
const bySeats=Object.entries(pSeats).sort((a,b)=>b[1]-a[1]);
const byVotes=Object.entries(pVotes).sort((a,b)=>b[1]-a[1]).slice(0,9);

/* ----- party filter ----- */
const pf=document.getElementById('pf');
bySeats.forEach(([p])=>{const o=document.createElement('option');o.value=p;o.textContent=sh(p)+' — '+p;pf.appendChild(o);});

/* ----- scorecard ----- */
const maxS=bySeats[0][1];
const sl=document.getElementById('scoreList');
bySeats.forEach(([p,s])=>{
  const pct=(s/234*100).toFixed(1);
  const row=document.createElement('div');
  row.className='srow';
  row.innerHTML='<div class="sdot" style="background:'+pc(p)+'"></div>'
    +'<div class="sname" title="'+p+'">'+sh(p)+'</div>'
    +'<div class="sbar-w"><div class="sbar" style="width:'+(s/maxS*100).toFixed(1)+'%;background:'+pc(p)+'"></div></div>'
    +'<div class="sseats" style="color:'+pc(p)+'">'+s+'</div>';
  sl.appendChild(row);
});

/* ----- donut chart ----- */
new Chart(document.getElementById('cvDonut'),{
  type:'doughnut',
  data:{
    labels:byVotes.map(([p])=>sh(p)),
    datasets:[{data:byVotes.map(([,v])=>v),backgroundColor:byVotes.map(([p])=>pc(p)),borderWidth:1,borderColor:'#080c18'}]
  },
  options:{responsive:true,maintainAspectRatio:true,cutout:'62%',
    plugins:{
      legend:{position:'right',labels:{color:'#7a8fb0',font:{size:9},boxWidth:9,padding:5}},
      tooltip:{callbacks:{label:c=>' '+sh(c.label)+': '+(c.raw/1e6).toFixed(2)+'M'}}
    }
  }
});

/* ----- seats bar ----- */
new Chart(document.getElementById('cvSeats'),{
  type:'bar',
  data:{
    labels:bySeats.map(([p])=>sh(p)),
    datasets:[{label:'Seats',data:bySeats.map(([,s])=>s),backgroundColor:bySeats.map(([p])=>pc(p)),borderRadius:4,borderWidth:0}]
  },
  options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.raw+' seats'}}},
    scales:{
      x:{ticks:{color:'#7a8fb0',font:{size:8.5}},grid:{color:'#111827'}},
      y:{ticks:{color:'#7a8fb0',font:{size:8.5}},grid:{color:'#111827'},beginAtZero:true}
    }
  }
});

/* ----- margin chart ----- */
let mChart=null;
function drawMargin(mode){
  const src=[...RAW].sort((a,b)=>mode==='top'?b.m-a.m:a.m-b.m).slice(0,10);
  if(mChart)mChart.destroy();
  mChart=new Chart(document.getElementById('cvMargin'),{
    type:'bar',
    data:{
      labels:src.map(d=>d.c),
      datasets:[{data:src.map(d=>d.m),backgroundColor:src.map(d=>pc(d.p)),borderRadius:3,borderWidth:0}]
    },
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.raw.toLocaleString()+' votes margin'}}},
      scales:{
        x:{ticks:{color:'#7a8fb0',font:{size:8},callback:v=>v>=1000?Math.round(v/1000)+'K':v},grid:{color:'#111827'}},
        y:{ticks:{color:'#c0cce0',font:{size:8}},grid:{display:false}}
      }
    }
  });
}
drawMargin('top');
window.switchM=function(m){
  document.getElementById('tbH').className='tab'+(m==='top'?' on':'');
  document.getElementById('tbL').className='tab'+(m==='low'?' on':'');
  drawMargin(m);
};

/* ----- analysis chart (NOTA / postal / turnout) ----- */
let aChart=null;
function drawAnalysis(mode){
  let src, label, color;
  if(mode==='nota'){
    src=[...RAW].sort((a,b)=>b.notas-a.notas).slice(0,10);
    label='NOTA %'; color='#f59e0b';
    src={labels:src.map(d=>d.c),data:src.map(d=>d.notas),label,color};
  } else if(mode==='postal'){
    const tmp=[...RAW].sort((a,b)=>(b.post/b.wv)-(a.post/a.wv)).slice(0,10);
    src={labels:tmp.map(d=>d.c),data:tmp.map(d=>+((d.post/d.wv)*100).toFixed(2)),label:'Postal Vote %',color:'#38bdf8'};
  } else {
    const tmp=[...RAW].sort((a,b)=>b.tv-a.tv).slice(0,10);
    src={labels:tmp.map(d=>d.c),data:tmp.map(d=>+(d.tv/1000).toFixed(1)),label:'Total Votes (K)',color:'#34d399'};
  }
  if(aChart)aChart.destroy();
  aChart=new Chart(document.getElementById('cvAnalysis'),{
    type:'bar',
    data:{labels:src.labels,datasets:[{data:src.data,backgroundColor:src.color+'bb',borderRadius:3,borderWidth:0,label:src.label}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.raw+(mode==='turnout'?'K':' %')}}},
      scales:{
        x:{ticks:{color:'#7a8fb0',font:{size:8},callback:v=>mode==='turnout'?v+'K':v+'%'},grid:{color:'#111827'}},
        y:{ticks:{color:'#c0cce0',font:{size:8}},grid:{display:false}}
      }
    }
  });
}
drawAnalysis('nota');
window.switchA=function(m){
  ['tbN','tbP','tbT'].forEach((id,i)=>{
    document.getElementById(id).className='tab'+(['nota','postal','turnout'][i]===m?' on':'');
  });
  drawAnalysis(m);
};

/* ----- results table ----- */
let filtered=[...RAW], sKey='n', sDir=1;
window.ST=function(k){if(sKey===k)sDir*=-1;else{sKey=k;sDir=1;}renderTable();};

function renderTable(){
  const body=document.getElementById('tbody');
  const ct=document.getElementById('rcount');
  const rows=[...filtered].sort((a,b)=>{
    const av=a[sKey], bv=b[sKey];
    if(typeof av==='string')return av.localeCompare(bv)*sDir;
    return(av-bv)*sDir;
  });
  ct.textContent=rows.length+' seats';
  body.innerHTML=rows.map(function(d){
    var c=pc(d.p);
    var wn=d.w.length>17?d.w.slice(0,16)+'…':d.w;
    return '<tr>'
      +'<td>'+d.n+'</td>'
      +'<td title="'+d.c+'">'+d.c+'</td>'
      +'<td title="'+d.w+'">'+wn+'</td>'
      +'<td><span class="badge" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'55">'+sh(d.p)+'</span></td>'
      +'<td>'+d.wv.toLocaleString()+'</td>'
      +'<td>'+d.ws+'%</td>'
      +'<td>'+d.m.toLocaleString()+'</td>'
      +'<td>'+d.nota.toLocaleString()+'</td>'
      +'</tr>';
  }).join('');
}
renderTable();

function applyFilters(){
  const s=document.getElementById('srch').value.toLowerCase();
  const p=document.getElementById('pf').value;
  const mfv=document.getElementById('mf').value;
  filtered=RAW.filter(function(d){
    if(s && !d.c.toLowerCase().includes(s) && !d.w.toLowerCase().includes(s))return false;
    if(p && d.p!==p)return false;
    if(mfv){var parts=mfv.split('-');var lo=+parts[0],hi=+parts[1];if(d.m<lo||d.m>hi)return false;}
    return true;
  });
  renderTable();
}
document.getElementById('srch').addEventListener('input',applyFilters);
document.getElementById('pf').addEventListener('change',applyFilters);
document.getElementById('mf').addEventListener('change',applyFilters);
</script>
